name: skymetron-prod

# SkyMetron — Production deployment stack.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f sky-core
#   docker compose -f docker-compose.prod.yml down
#
# Environment variables:
#   Create a .env file in this directory with:
#     SKY_DB_PASSWORD=<strong password>
#     SKY_JWT_SECRET=<32+ byte base64 secret>
#     SKY_ENCRYPTION_KEY=<32 byte base64 master key>
#     SKY_RABBIT_PASSWORD=<rabbitmq password>
#     SKY_OLLAMA_URL=http://host.docker.internal:11434
#     GRAFANA_PASSWORD=<grafana admin password>

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: skymetron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skymetron
      POSTGRES_USER: skymetron
      POSTGRES_PASSWORD: ${SKY_DB_PASSWORD:-skymetron}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - skymetron-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skymetron -d skymetron"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - skymetron-net

  redis:
    image: redis:7.4-alpine
    container_name: skymetron-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - skymetron-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - skymetron-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: skymetron-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: skymetron
      RABBITMQ_DEFAULT_PASS: ${SKY_RABBIT_PASSWORD:-skymetron}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - skymetron-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - skymetron-net

  ai-services:
    image: ghcr.io/anomalyco/skymetron/sky-ai-services:latest
    container_name: skymetron-ai-services
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${SKY_OLLAMA_URL:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: nomic-embed-text
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - skymetron-net

  sky-core:
    image: ghcr.io/anomalyco/skymetron/sky-core:latest
    container_name: skymetron-core
    restart: unless-stopped
    environment:
      SKY_DB_HOST: postgres
      SKY_DB_PORT: "5432"
      SKY_DB_NAME: skymetron
      SKY_DB_USER: skymetron
      SKY_DB_PASSWORD: ${SKY_DB_PASSWORD:-skymetron}
      SKY_REDIS_HOST: redis
      SKY_REDIS_PORT: "6379"
      SKY_RABBIT_HOST: rabbitmq
      SKY_RABBIT_PORT: "5672"
      SKY_RABBIT_USER: skymetron
      SKY_RABBIT_PASSWORD: ${SKY_RABBIT_PASSWORD:-skymetron}
      SKY_AI_SERVICES_URL: http://ai-services:8000
      SKY_OLLAMA_URL: ${SKY_OLLAMA_URL:-http://host.docker.internal:11434}
      SKY_EMBEDDING_MODEL: nomic-embed-text
      SKY_JWT_SECRET: ${SKY_JWT_SECRET}
      SKY_ENCRYPTION_KEY: ${SKY_ENCRYPTION_KEY}
      SKY_CORE_PORT: "8080"
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseZGC -XX:MaxMetaspaceSize=128m"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-services:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768m
    networks:
      - skymetron-net

  observability:
    profiles:
      - monitoring
    image: grafana/grafana:11.4.0
    container_name: skymetron-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-skymetron}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - skymetron-grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - skymetron-net

volumes:
  skymetron-pgdata:
  skymetron-redis-data:
  skymetron-rabbitmq-data:
  skymetron-grafana-data:

networks:
  skymetron-net:
    driver: bridge
